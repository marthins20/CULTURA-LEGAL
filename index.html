// ======================= MAPEO DE BARRIOS A COMUNAS (Corregido según Wikipedia y solicitud) =======================
const BARRIO_TO_COMUNA = {
  // Comuna 1 - Centro Histórico (incluye Santa Rosa, Kennedy, San Antonio, La Garita)
  "Santa Rosa":"Comuna 1 - Centro Histórico", "Kennedy":"Comuna 1 - Centro Histórico", "San Antonio":"Comuna 1 - Centro Histórico",
  "La Garita":"Comuna 1 - Centro Histórico", "Las Delicias":"Comuna 1 - Centro Histórico", "Cinco de Noviembre":"Comuna 1 - Centro Histórico",
  // Comuna 2 - Suroriental (Brasil = Las Américas, Simón Bolívar)
  "Las Américas":"Comuna 2 - Suroriental", "Simón Bolívar":"Comuna 2 - Suroriental", "San Fernando":"Comuna 2 - Suroriental",
  // Comuna 3 - Sur (San Martín, Primero de Mayo)
  "San Martín":"Comuna 3 - Sur", "Primero de Mayo":"Comuna 3 - Sur",
  // Comuna 4 - Oeste (Urbani Verona, Villa Miriam, Dangond, Casimiro, Valparaíso, Altos de Comfacesar, Senderos del Country, Ciudad Tayrona)
  "Urbani Verona":"Comuna 4 - Oeste", "Villa Miriam":"Comuna 4 - Oeste", "Dangond":"Comuna 4 - Oeste", "Casimiro":"Comuna 4 - Oeste",
  "Valparaíso":"Comuna 4 - Oeste", "Altos de Comfacesar":"Comuna 4 - Oeste", "Senderos del Country":"Comuna 4 - Oeste", "Ciudad Tayrona":"Comuna 4 - Oeste",
  // Comuna 5 - Noroeste (Garupal, San Joaquín, Canaguate, Villa Carel, El Amparo)
  "Garupal":"Comuna 5 - Noroeste", "San Joaquín":"Comuna 5 - Noroeste", "Canaguate":"Comuna 5 - Noroeste", "Villa Carel":"Comuna 5 - Noroeste",
  "El Amparo":"Comuna 5 - Noroeste",
  // Corregimiento
  "Patillal":"Corregimiento de Patillal",
  // Zona periurbana
  "Casas La Pradera":"Zona Periurbana / Vía La Mesa",
  // Default
  "Villa Ariana":"Comuna 4 - Oeste" // Ajuste adicional
};
const COMUNA_LIST = ["Comuna 1 - Centro Histórico","Comuna 2 - Suroriental","Comuna 3 - Sur","Comuna 4 - Oeste","Comuna 5 - Noroeste","Corregimiento de Patillal","Zona Periurbana / Vía La Mesa"];
const COMUNA_COLORS = {
  "Comuna 1 - Centro Histórico":"#C62828", "Comuna 2 - Suroriental":"#1565C0", "Comuna 3 - Sur":"#00695C",
  "Comuna 4 - Oeste":"#E65100", "Comuna 5 - Noroeste":"#F9A825", "Corregimiento de Patillal":"#4E342E", "Zona Periurbana / Vía La Mesa":"#37474F"
};

// ======================= ESTADO GLOBAL =======================
let currentMonth=5, currentYear=2026, currentDateKey=null, currentOrders=[], leafMap=null, markers={}, statusMaps={};
const MONTHS_ES=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MONTHS_DAYS=[0,31,28,31,30,31,30,31,31,30,31,30,31];
function getDaysInMonth(m,y){ if(m===2&&((y%4===0&&y%100!==0)||y%400===0)) return 29; return MONTHS_DAYS[m]; }
function getFirstDayOfMonth(m,y){ return new Date(y,m-1,1).getDay(); }

function selectMonth(m){ currentMonth=m; currentDateKey=null; renderMonthNav(); renderDayGrid(); document.getElementById('routeContent').innerHTML=''; }
function renderMonthNav(){ let html='<span class="nav-label">📆 Mes:</span>'; for(let i=5;i<=12;i++){ let hasData=i===5?'has-data':''; let active=i===currentMonth?'active':''; html+=`<button class="month-btn ${hasData} ${active}" onclick="selectMonth(${i})">${MONTHS_ES[i]}</button>`; } document.getElementById('monthNav').innerHTML=html; }
function renderDayGrid(){
  let days=getDaysInMonth(currentMonth,currentYear),firstDay=getFirstDayOfMonth(currentMonth,currentYear);
  document.getElementById('dayNavTitle').innerHTML=`📅 ${MONTHS_ES[currentMonth]} ${currentYear} · Seleccione día`;
  let html='<div class="dow-header">Dom</div><div class="dow-header">Lun</div><div class="dow-header">Mar</div><div class="dow-header">Mié</div><div class="dow-header">Jue</div><div class="dow-header">Vie</div><div class="dow-header">Sáb</div>';
  for(let i=0;i<firstDay;i++) html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=days;d++){ let key=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`,has=!!ROUTE_DB[key],active=(key===currentDateKey); html+=`<div class="day-cell ${has?'has-route':''} ${active?'active':''}" onclick="selectDay('${key}')"><span class="day-n">${d}</span>${has?'<div class="day-dot"></div>':''}</div>`; }
  document.getElementById('dayGrid').innerHTML=html;
}
function selectDay(key){ currentDateKey=key; renderDayGrid(); if(ROUTE_DB[key]) loadRoute(key); else document.getElementById('routeContent').innerHTML=`<div class="day-placeholder"><h3>📋 Sin ruta para ${key}</h3></div>`; }

function getStatusKey(dk){ return 'status_'+dk; }
function loadStatus(dk){ if(!statusMaps[dk]){ statusMaps[dk]=new Map(); try{ let raw=localStorage.getItem(getStatusKey(dk)); if(raw){ let obj=JSON.parse(raw); Object.entries(obj).forEach(([k,v])=>statusMaps[dk].set(k,v)); } }catch(e){} } }
function saveStatus(dk){ let obj={}; for(let [k,v] of statusMaps[dk].entries()) obj[k]=v; localStorage.setItem(getStatusKey(dk),JSON.stringify(obj)); }
function setStatus(id,st,dk){ loadStatus(dk); statusMaps[dk].set(id,st); saveStatus(dk); renderFilteredList(dk); updateMapMarkers(); }
function resetAllStatus(dk){ if(confirm('Resetear todos los estados?')){ loadStatus(dk); statusMaps[dk].clear(); saveStatus(dk); renderFilteredList(dk); updateMapMarkers(); } }
function getStatus(id,dk){ loadStatus(dk); return statusMaps[dk].get(id)||'pendiente'; }

function loadRoute(key){
  let route=ROUTE_DB[key];
  let orders=route.orders.map(o=>({...o, comuna: BARRIO_TO_COMUNA[o.barrio] || "Comuna 1 - Centro Histórico"}));
  currentOrders=orders;
  window._allOrders=orders;
  renderFullUI(key);
}
function renderFullUI(dk){
  let route=ROUTE_DB[dk];
  let html=`<div class="route-section"><div class="route-header"><div class="route-header-top"><div><h2>📅 ${route.title}</h2><p>${currentOrders.length} órdenes · Técnico: ${route.tecnico}</p></div><div><button class="btn-map-toggle" onclick="toggleMap()">🗺️ Ocultar Mapa</button><button class="btn-excel" onclick="exportExcel('${dk}')">📎 Excel</button><button class="btn-reset-hdr" onclick="resetAllStatus('${dk}')">↺ Reset</button></div></div></div>
    <div id="mapContainer_r"><div id="map_r" style="height:380px;"></div><div class="map-legend"><span><span class="legend-dot" style="background:#1565C0"></span>Mañana</span><span><span class="legend-dot" style="background:#E65100"></span>Tarde</span><span><span class="legend-dot" style="background:#2E7D32"></span>Realizado</span><span><span class="legend-dot" style="background:#c62828"></span>No realizado</span><span><span class="legend-dot" style="background:#E65100"></span>Entregó eq.</span><span><span class="legend-dot" style="background:#0d47a1"></span>Agendado</span></div></div>
    <div class="zone-maps-container" id="zoneMapsContainer"></div>
    <div class="stats"><div class="stat"><div class="stat-n" id="totalCount">0</div><div class="stat-l">Visibles</div></div><div class="stat"><div class="stat-n" id="realCount">0</div><div class="stat-l">Realizados</div></div></div>
    <div class="controls"><div class="filter-group"><label>🔍 Buscar</label><input type="text" id="searchInput" placeholder="Nombre, dirección" oninput="renderFilteredList('${dk}')"></div>
    <div class="filter-group"><label>🏘️ Comuna</label><select id="comunaFilter" onchange="renderFilteredList('${dk}')"><option value="">Todas</option>${COMUNA_LIST.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div class="filter-group"><label>⏰ Jornada</label><select id="jornadaFilter" onchange="renderFilteredList('${dk}')"><option value="">Ambas</option><option value="Mañana">Mañana</option><option value="Tarde">Tarde</option></select></div>
    <div class="filter-group"><label>✅ Estado (oculta realizados por defecto)</label><select id="statusFilter" onchange="renderFilteredList('${dk}')"><option value="hide_done">Ocultar realizados</option><option value="all">Mostrar todos</option></select></div>
    <button class="reset-btn" onclick="resetAllStatus('${dk}')">⟳ Reset</button></div>
    <div class="list" id="ordersList"></div></div>`;
  document.getElementById('routeContent').innerHTML=html;
  setTimeout(()=>{ initMap(currentOrders); initZoneMaps(currentOrders); renderFilteredList(dk); },60);
}
function initMap(orders){
  if(leafMap){ leafMap.remove(); leafMap=null; markers={}; }
  leafMap=L.map("map_r").setView([10.463,-73.264],13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap'}).addTo(leafMap);
  orders.forEach(o=>{ let icon=L.divIcon({html:`<div style="background:#777;color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:10px;">${o.routeOrder}</div>`,iconSize:[26,26]}); let mk=L.marker([o.lat,o.lng],{icon}).addTo(leafMap).bindPopup(`<b>#${o.routeOrder} ${o.name}</b><br>${o.addr}<br>${o.comuna}`); markers[o.id]=mk; });
}
function updateMapMarkers(){ if(!leafMap||!currentDateKey) return; currentOrders.forEach(o=>{ let st=getStatus(o.id,currentDateKey); let color=st==='realizado'?'#2E7D32':st==='no_realizado'?'#c62828':st==='entregado'?'#E65100':st==='agendado'?'#0d47a1':'#777'; let icon=L.divIcon({html:`<div style="background:${color};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:10px;">${o.routeOrder}</div>`,iconSize:[26,26]}); if(markers[o.id]) markers[o.id].setIcon(icon); }); }
function toggleMap(){ let cont=document.getElementById("mapContainer_r"); if(cont) cont.style.display=cont.style.display==="none"?"":"none"; }
function initZoneMaps(orders){
  let groups={}; orders.forEach(o=>{ if(!groups[o.comuna]) groups[o.comuna]=[]; groups[o.comuna].push(o); });
  let container=document.getElementById("zoneMapsContainer"); if(!container) return; container.innerHTML="";
  for(let com of COMUNA_LIST){ if(!groups[com]) continue;
    let color=COMUNA_COLORS[com]||'#555'; let id=`zmap_${com.replace(/[^a-z]/gi,'')}`;
    let card=document.createElement("div"); card.className="zone-map-card";
    card.innerHTML=`<div class="zone-map-header" style="background:${color}"><span>📍 ${com}</span><span>${groups[com].length} visitas</span></div><div class="zone-map-leaflet" id="${id}"></div><div class="zone-map-footer">${groups[com].map(o=>`#${o.routeOrder} ${o.name.split(' ')[0]}`).join(' → ')}</div>`;
    container.appendChild(card);
    setTimeout(()=>{ let lats=groups[com].map(o=>o.lat),lngs=groups[com].map(o=>o.lng),cLat=lats.reduce((a,b)=>a+b,0)/lats.length,cLng=lngs.reduce((a,b)=>a+b,0)/lngs.length; let lm=L.map(id).setView([cLat,cLng],14); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(lm); let latlngs=groups[com].map(o=>[o.lat,o.lng]); if(latlngs.length>1) L.polyline(latlngs,{color:color,weight:3}).addTo(lm); groups[com].forEach(o=>{ let ic=L.divIcon({html:`<div style="background:${color};color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;">${o.routeOrder}</div>`,iconSize:[22,22]}); L.marker([o.lat,o.lng],{icon:ic}).addTo(lm).bindPopup(`#${o.routeOrder} ${o.name}`); }); if(latlngs.length>1) lm.fitBounds(L.latLngBounds(latlngs).pad(.2)); },80);
  }
}
function renderFilteredList(dk){
  let search=(document.getElementById("searchInput")?.value||"").toLowerCase();
  let comunaF=(document.getElementById("comunaFilter")?.value||"");
  let jornadaF=(document.getElementById("jornadaFilter")?.value||"");
  let statusF=(document.getElementById("statusFilter")?.value||"hide_done");
  let all=(window._allOrders||[]);
  let filtered=all.filter(o=>{
    let st=getStatus(o.id,dk);
    if(statusF==="hide_done" && st==="realizado") return false;
    if(comunaF && o.comuna!==comunaF) return false;
    if(jornadaF && o.jornada!==jornadaF) return false;
    if(search && !(`${o.name} ${o.addr} ${o.id}`.toLowerCase().includes(search))) return false;
    return true;
  });
  let realizados=all.filter(o=>getStatus(o.id,dk)==="realizado").length;
  document.getElementById("totalCount").innerText=filtered.length;
  document.getElementById("realCount").innerText=realizados;
  let groups={}; filtered.forEach(o=>{ if(!groups[o.comuna]) groups[o.comuna]=[]; groups[o.comuna].push(o); });
  let listHtml="";
  for(let com of COMUNA_LIST){
    if(!groups[com]) continue;
    let color=COMUNA_COLORS[com];
    listHtml+=`<div class="comuna-group"><div class="comuna-header" style="background:${color}"><span>🏘️ ${com}</span><span>${groups[com].length} visitas</span></div>`;
    groups[com].sort((a,b)=>a.routeOrder-b.routeOrder).forEach(o=>{
      let st=getStatus(o.id,dk);
      listHtml+=`<div class="card ${o.jornada==='Mañana'?'manana-card':'tarde-card'}"><div class="num"><span class="route-num">#${o.routeOrder}</span>${o.id}</div>
        <div class="info"><div class="name-row"><span class="name">${o.name}</span><span class="jornada-badge ${o.jornada==='Mañana'?'jornada-manana':'jornada-tarde'}">${o.jornada}</span></div>
        <div class="addr">📍 ${o.addr} · ${o.barrio}</div><div class="tags"><span class="tag ${o.tipo==='Voluntarios'?'tag-vol':'tag-cart'}">${o.tipo}</span><span class="tag">📞 ${o.cel||'—'}</span><span class="tag">Cta: ${o.acct}</span></div>
        <div class="inv-section"><div class="inv-header" onclick="toggleInv('${o.id}')"><span class="inv-badge">${o.equip?.length||0} equipos</span><span>▼</span></div>
        <div class="inv-list" id="inv_${o.id}">${(o.equip||[]).map(e=>`<div class="inv-row">${e.t||''} ${e.f||''} · <b>${e.s||''}</b></div>`).join('')||"<div>Sin seriales</div>"}</div></div></div>
        <div class="actions"><div class="status-group"><button class="status-btn ${st==='realizado'?'status-active':''}" onclick="setStatus('${o.id}','realizado','${dk}')">✅ Realizado</button><button class="status-btn ${st==='no_realizado'?'status-active':''}" onclick="setStatus('${o.id}','no_realizado','${dk}')">❌ No realizado</button><button class="status-btn ${st==='entregado'?'status-active':''}" onclick="setStatus('${o.id}','entregado','${dk}')">📦 Entregó eq.</button><button class="status-btn ${st==='agendado'?'status-active':''}" onclick="setStatus('${o.id}','agendado','${dk}')">📅 Agendado</button></div><div class="nav-btns"><a class="waze-btn" href="https://waze.com/ul?q=${encodeURIComponent(o.addr+', Valledupar')}&navigate=yes" target="_blank">🧭 Waze</a><button class="wa-btn-card" onclick="sendWhatsApp(${JSON.stringify(o).replace(/'/g, "&#39;")})">💬 WhatsApp</button></div></div></div>`;
    });
    listHtml+=`</div>`;
  }
  document.getElementById("ordersList").innerHTML=listHtml||"<div style='padding:2rem;text-align:center'>✅ Todas las órdenes han sido realizadas o no hay coincidencias</div>";
  updateMapMarkers();
}
function toggleInv(id){ let el=document.getElementById('inv_'+id); if(el) el.classList.toggle('open'); }
function sendWhatsApp(o){ let phone=o.cel?.replace(/\D/g,''); if(!phone){ alert("Sin número"); return; } let msg=`📡 LOGYTECH MOBILE: Visita técnica hoy en ${o.addr}, ${o.barrio}. Equipos: ${o.equip?.length||0}. Técnico Martín 3043877555.`; window.open(`https://wa.me/57${phone}?text=${encodeURIComponent(msg)}`,'_blank'); }
function exportExcel(dk){ let wb=XLSX.utils.book_new(); let sheet=[["#","ID","Cuenta","Nombre","Dirección","Barrio","Comuna","Jornada","Tipo","Estado","Celular","Equipos"]]; currentOrders.forEach(o=>{ sheet.push([o.routeOrder,o.id,o.acct,o.name,o.addr,o.barrio,o.comuna,o.jornada,o.tipo,getStatus(o.id,dk),o.cel,(o.equip||[]).length]); }); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sheet),`RUTA_${dk}`); XLSX.writeFile(wb,`VALLEDUPAR_${dk}.xlsx`); }
window.addEventListener('DOMContentLoaded',()=>{ renderMonthNav(); selectMonth(5); selectDay('2026-05-04'); });
window.selectMonth=selectMonth; window.selectDay=selectDay; window.setStatus=setStatus; window.resetAllStatus=resetAllStatus; window.toggleMap=toggleMap; window.renderFilteredList=renderFilteredList; window.toggleInv=toggleInv; window.sendWhatsApp=sendWhatsApp; window.exportExcel=exportExcel;
</script>
